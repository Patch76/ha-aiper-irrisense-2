              - entity: sensor.irrisense_back_lawn_wifi_signal
                name: WiFi signal
# <<<< END RAW CONFIG  ========================================================


# =============================================================================
# Troubleshooting
# =============================================================================
#
# Hero card doesn't appear when a zone starts
#   -> The conditional hinges on `binary_sensor.irrisense_*_watering`
#     (the real watering indicator), not on the active_zone string. If
#     the binary_sensor is stuck, the hero stays hidden. Check that the
#     binary_sensor is transitioning to `on` in Developer Tools.
#
# Zone tiles don't highlight when that zone is running
#   -> The `[[[ ... ]]]` JS templates compare against the lowercase
#     `zname` variable. Make sure `variables.zname` matches the start
#     of the zone's name in `select.irrisense_*_watering_zone` options,
#     case-insensitive (the template lowercases both sides before
#     comparing).
#
# Zone tile tap does nothing
#   -> Developer Tools -> States -> `select.irrisense_*_watering_zone`.
#     Check the `options` attribute lists your zone with a region type
#     suffix in parentheses, e.g. "Grass (Area)". If the list is empty
#     or missing the zone, the integration hasn't resolved your regions
#     yet — let it run for a minute, or reload the integration.
#
# Hero time reads "0:00" instead of counting down
#   -> `duration_seconds` or `elapsed_seconds` is missing on the active
#     zone sensor's attributes. Restart the zone to force a fresh
#     latch, or check the sensor in Developer Tools.
#
# Apexcharts shows "No data"
#   -> The history integration needs a few run cycles to build up. New
#     installs start empty. It'll fill in as you water.
#
# -----------------------------------------------------------------------------
# Adding more zones
# -----------------------------------------------------------------------------
# Copy any of the button-card blocks inside the zone grid. Change:
#   1. `name:`      — what shows on the tile
#   2. `icon:`      — any mdi icon
#   3. `variables.zname:` — lowercase match of the zone's name (the part
#                           before the region-type suffix in the select's
#                           `options` attribute)
# Everything else — region-type badge, active highlight, tap action —
# flows from the anchor/alias references and resolves automatically.
# =============================================================================
